site_name: Architect Knowledge Library
site_description: Cloud architecture best practices, checklists, and compliance guides
repo_url: https://github.com/ErikEvenson/architect
docs_dir: knowledge

theme:
  name: material
  palette:
    scheme: slate
    primary: blue
    accent: blue
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.integrate

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/external-links.js

