# Headless service for stable DNS
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
# StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "architect"
            - name: POSTGRES_USER
              value: "architect"
            - name: POSTGRES_PASSWORD_FILE
              value: "/run/secrets/postgres_password"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: secrets
              mountPath: /run/secrets
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - architect
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - architect
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: secrets
          secret:
            secretName: architect-secrets
            items:
              - key: postgres-password
                path: postgres_password
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: hostpath
        resources:
          requests:
            storage: 1Gi
---
# Backup PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backup
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: hostpath
  resources:
    requests:
      storage: 1Gi
---
# Daily backup CronJob
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16-alpine
              command:
                - /bin/sh
                - -c
                - |
                  PGPASSWORD=$(cat /run/secrets/postgres_password) \
                  pg_dump -h postgres -U architect architect \
                  > /backup/architect-$(date +%Y%m%d).sql && \
                  find /backup -name "architect-*.sql" -mtime +7 -delete
              volumeMounts:
                - name: backup
                  mountPath: /backup
                - name: secrets
                  mountPath: /run/secrets
                  readOnly: true
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: postgres-backup
            - name: secrets
              secret:
                secretName: architect-secrets
                items:
                  - key: postgres-password
                    path: postgres_password
