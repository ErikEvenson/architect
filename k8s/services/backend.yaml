apiVersion: apps/v1
kind: Deployment
metadata:
  name: architect-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: architect-backend
  template:
    metadata:
      labels:
        app: architect-backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for postgres..."
                sleep 2
              done
      containers:
        - name: backend
          image: architect-backend:0.1.0
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: architect-config
          env:
            - name: SECRETS_DIR
              value: /app/secrets
          volumeMounts:
            - name: secrets
              mountPath: /app/secrets
              readOnly: true
            - name: outputs
              mountPath: /app/data/outputs
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: secrets
          secret:
            secretName: architect-secrets
            items:
              - key: postgres-password
                path: postgres_password
        - name: outputs
          persistentVolumeClaim:
            claimName: architect-outputs
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: architect-outputs
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: hostpath
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: architect-backend
spec:
  type: NodePort
  selector:
    app: architect-backend
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30010
