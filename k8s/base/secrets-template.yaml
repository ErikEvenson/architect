# REFERENCE ONLY — Do not apply directly.
# Use scripts/create-secrets.sh to generate secrets.
#
# Keys:
#   postgres-password — PostgreSQL password
#
# Secrets are mounted as files into containers.
# Key names use kebab-case in K8s but map to underscore filenames:
#   postgres-password → /app/secrets/postgres_password
apiVersion: v1
kind: Secret
metadata:
  name: architect-secrets
type: Opaque
data:
  postgres-password: <base64-encoded-value>
